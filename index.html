<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Card</title>

<style>
:root{
    --beige:#F4EEE6;
    --sage:#B8C4B1;
    --sage-dark:#8E9C89;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow:hidden;
    font-family: "Trebuchet MS", sans-serif;
    background: linear-gradient(
        135deg,
        var(--beige),
        #E8E1D8,
        var(--sage)
    );
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.container{
    text-align:center;
    z-index:5;
}

/* KOPERTA */

.envelope{
    position:relative;
    width:260px;
    height:180px;
    margin:auto;
}

.base{
    position:absolute;
    width:100%;
    height:100%;
    background:#d7c6b3;
    border-radius:0 0 12px 12px;
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#c6b29c;
    clip-path:polygon(0 0,100% 0,50% 55%);
    transform-origin:top;
    transition:1.2s;
    z-index:3;
}

.letter{
    position:absolute;
    left:10%;
    top:20px;
    width:80%;
    height:130px;
    background:white;
    border-radius:8px;
    padding:15px;
    transition:1.2s;
    z-index:2;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:#666;
    font-size:14px;
}

.open .flap{
    transform:rotateX(180deg);
}

.open .letter{
    transform:translateY(-120px);
}

button{
    margin-top:30px;
    padding:14px 28px;
    border:none;
    border-radius:30px;
    background:var(--sage-dark);
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

.title{
    margin-top:30px;
    font-size:clamp(2rem,6vw,4rem);
    color:#5d6d5a;
    opacity:0;
    transition:1s;
}

.show-title{
    opacity:1;
}

/* ROWEREK */

.bike-wrapper{
    position:absolute;
    bottom:25px;
    left:-250px;
    opacity:0;
}

.run-bike{
    opacity:1;
    animation:ride 10s linear forwards;
}

@keyframes ride{
    from{
        left:-250px;
    }
    to{
        left:110%;
    }
}

.balloons{
    position:absolute;
    left:65px;
    bottom:60px;
}

.balloon{
    width:22px;
    height:30px;
    border-radius:50%;
    position:absolute;
}

.b1{
    background:#d8b4a0;
    left:0;
}

.b2{
    background:#a8bfa2;
    left:25px;
}

.b3{
    background:#f0d9b5;
    left:50px;
}

.string{
    position:absolute;
    width:1px;
    height:40px;
    background:#555;
    top:28px;
}

.s1{left:11px;}
.s2{left:36px;}
.s3{left:61px;}

svg{
    width:200px;
    height:auto;
}

/* TELEFON */

@media(max-width:600px){

    .envelope{
        width:220px;
        height:150px;
    }

    .letter{
        font-size:12px;
    }

    svg{
        width:160px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="envelope" id="envelope">

        <div class="base"></div>

        <div class="letter">
            Wszystkiego najlepszego! 🎂
        </div>

        <div class="flap"></div>

    </div>

    <button onclick="surprise()">
        🎁 Niespodzianka
    </button>

    <h1 id="title" class="title">
        Happy Birthday!
    </h1>

</div>

<div id="bike" class="bike-wrapper">

    <div class="balloons">

        <div class="balloon b1"></div>
        <div class="balloon b2"></div>
        <div class="balloon b3"></div>

        <div class="string s1"></div>
        <div class="string s2"></div>
        <div class="string s3"></div>

    </div>

    <svg viewBox="0 0 300 150">

        <circle cx="70" cy="100" r="35"
                fill="none"
                stroke="#333"
                stroke-width="5"/>

        <circle cx="230" cy="100" r="35"
                fill="none"
                stroke="#333"
                stroke-width="5"/>

        <line x1="70" y1="100"
              x2="140" y2="50"
              stroke="#333"
              stroke-width="5"/>

        <line x1="140" y1="50"
              x2="180" y2="100"
              stroke="#333"
              stroke-width="5"/>

        <line x1="180" y1="100"
              x2="70" y2="100"
              stroke="#333"
              stroke-width="5"/>

        <line x1="140" y1="50"
              x2="230" y2="100"
              stroke="#333"
              stroke-width="5"/>

        <line x1="140" y1="50"
              x2="165" y2="25"
              stroke="#333"
              stroke-width="5"/>

        <line x1="155" y1="20"
              x2="185" y2="20"
              stroke="#333"
              stroke-width="5"/>

        <line x1="215" y1="45"
              x2="240" y2="25"
              stroke="#333"
              stroke-width="5"/>

    </svg>

</div>

<script>

function surprise(){

    document
        .getElementById("envelope")
        .classList.add("open");

    setTimeout(() => {

        document
            .getElementById("title")
            .classList.add("show-title");

        document
            .getElementById("bike")
            .classList.add("run-bike");

    },800);
}

</script>

</body>
</html>
